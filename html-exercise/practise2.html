<!DOCTYPE html>
<html>

<head>
    <title>Text Exercise</title>
    <style>
        body {
            margin: 0;
        }

        .Exercises-Text {
            font-family: Arial;
            padding-top: 40px;
            min-height: 120vh;
            padding-bottom: 150px;
        }

        .video-title {
            font-weight: bold;
            font-size: 18px;
            line-height: 24px;
            margin-bottom: 5px;
            margin-top: 2px;
            width: 300px;
            padding-top: 50px;
        }


        .video-stats {
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
            color: rgb(96, 96, 96);
        }

        .channel-name {
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 18px;
            color: rgb(96, 96, 96);
        }

        .video-description {
            font-size: 14px;
            color: rgb(96, 96, 96);
            line-height: 20px;
            margin-bottom: 40px;
            width: 300px;
        }

        .ad-banner {
            background-color: rgb(227, 65, 64);
            padding: 18px;
            color: white;
            font-size: 14px;
            text-align: center;
            margin-left: 8px;
            margin-right: 8px;
            margin-top: 0;
        }

        .shop-link:hover {
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class='Exercises-Text'>
        <p class='video-title'>
            First day of my Full stack development journey.
        </p>
        <p class='video-stats'>
            3.4M views &#183; 6 months ago
        </p>
        <p class='channel-name'>
            Abhinav Singh &#10003;
        </p>
        <p class='video-description'>
            Today , I am going to start Full stack development journey.
        </p>

        <p class='ad-banner'>
            Shop early for the best selection of holiday favourites. <span class='shop-link'>Shop now &#62;</span>
        </p>
    </div>
</body>

</html>
