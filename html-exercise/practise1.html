<!DOCTYPE html>
<html lang="en">

<head>
  <title> creating buttons</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: whitesmoke;
      border-radius: 2px;
    }

    .like-button {
      background-color: white;
      color: rgb(6, 95, 212);
      border: 1px solid rgb(6, 95, 212);
      padding: 8px 14px;
      cursor: pointer;
      transition: background-color 0.15s,
        color 0.15s;
    }

    .like-button:hover {
      background-color: rgb(6, 95, 212);
      color: white;
    }

    .like-button:active {
      opacity: 0.7;
    }

    .subscribe-button {
      background-color: rgb(204, 0, 0);
      color: white;
      border: none;
      padding: 10px 16px;
      transition: opacity 0.15s;
    }

    .subscribe-button:hover {
      opacity: 0.7;
    }

    .subscribe-button:active {
      opacity: 0.4;
      transition: none;
    }

    .tweet-button {
      font-size: 15px;
      background-color: rgb(29, 155, 240);
      color: white;
      padding: 7px 16px;
      border: none;
      font-weight: bold;
      border-radius: 50px;
      line-height: 22.5px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .tweet-button:hover {
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }

    .tweet-button:active {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <h3> This is my first video</h3>
  <button class="like-button">
    LIKE
  </button>
  <button class="subscribe-button">
    SUBSCRIBE
  </button>
  <button class="join-button">
    JOIN
  </button>
</body>

</html>
